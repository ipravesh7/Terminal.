<!DOCTYPE html>
<html>
<head>
<title>Geopolitics Terminal</title>

<style>
body { 
  background:black; 
  color:#00ff9f; 
  font-family: monospace; 
}

.header { 
  text-align:center; 
  color:white; 
  font-family: 'Times New Roman'; 
  margin-bottom: 10px;
}

.feed { 
  width:30%; 
  float:left; 
  border-right:1px solid #00ff9f; 
  padding:10px; 
}

.main { 
  width:65%; 
  float:right; 
  padding:10px; 
}

.item { 
  margin:5px; 
  cursor:pointer; 
}

.item:hover {
  color:yellow;
}

/* Mobile fix */
@media (max-width: 768px) {
  .feed, .main {
    width:100%;
    float:none;
  }
}
</style>

</head>

<body>

<div class="header">
<h2> GEOPOLITICAL TERMINAL</h2>
</div>

<div class="feed" id="feed"></div>
<div class="main" id="details"> News.</div>

<script>

async function loadData(){
  try {
    const res = await fetch('https://geo-intel-backend.onrender.com/api/feed', {
      cache: "no-store"
    });

    const data = await res.json();
    console.log(data);

    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    data.forEach(item=>{
      const div = document.createElement('div');
      div.className = 'item';
      div.innerText = item.title;

      // ✅ FIXED CLICK (mobile friendly)
      div.onclick = ()=>{
        document.getElementById('details').innerHTML =
          "<b>" + item.title + "</b><br><br>" +
          item.content + "<br><br><b>Signal:</b> " + item.signal;
      };

      feed.appendChild(div);
    });

  } catch (error) {
    console.error("Error:", error);
    document.getElementById('details').innerText = "Error loading data...";
  }
}

loadData();

/* Auto refresh */
setInterval(loadData, 10000);

</script>

</body>
</html>
